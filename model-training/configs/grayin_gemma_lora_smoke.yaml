run:
  name: grayin-gemma-4-e2b-lora-smoke
  seed: 42

model:
  source_model_id: google/gemma-4-E2B-it
  source_model_revision: 70af34e20bd4b7a91f0de6b22675850c43922a03
  base_model_path: model-training/reference-models/gemma-4-e2b-it
  trust_remote_code: false
  torch_dtype: bfloat16
  device_map: cuda

dataset:
  train_jsonl: model-training/data/synthetic/grayin_app_behavior.jsonl
  text_field: text
  max_seq_length: 1024

lora:
  r: 8
  alpha: 16
  dropout: 0.05
  target_modules: "model\\.language_model\\.layers\\.[0-9]+\\.(self_attn\\.(q_proj|k_proj|v_proj|o_proj)|mlp\\.(gate_proj|up_proj|down_proj))"

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: bfloat16
  bnb_4bit_use_double_quant: true

training:
  output_dir: model-training/outputs/adapters/grayin-gemma-4-e2b-lora-smoke
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 1
  learning_rate: 0.0002
  num_train_epochs: 1
  max_steps: 1
  warmup_ratio: 0.0
  logging_steps: 1
  save_steps: 1
  save_total_limit: 1
  gradient_checkpointing: true
  packing: false

export:
  merged_output_dir: model-training/outputs/merged/grayin-gemma-4-e2b-smoke
  merge_provenance_file: model-training/outputs/provenance/grayin-gemma-4-e2b-smoke-merge.json
  litert_output_file: model-training/outputs/litert/grayin-gemma-4-E2B-it-wi8-afp32-smoke.litertlm
  export_provenance_file: model-training/outputs/provenance/grayin-gemma-4-e2b-wi8-afp32-smoke-export.json
  local_release_manifest_file: model-training/outputs/provenance/grayin-gemma-4-e2b-wi8-afp32-smoke-local-release.json
  chat_template_override_path: model-training/reference-models/litert-community-gemma-4-e2b/chat_template.jinja
  eval_fixtures: model-training/data/synthetic/grayin_eval.jsonl
  eval_fixture_count: 30
  eval_fixture_sha256: b8dcce7aeb2f569027c85dc6c024491883c536517a3b2534b5d355edcdf58b4d
  eval_predictions_file: model-training/outputs/eval/grayin-gemma-4-e2b-wi8-afp32-smoke-predictions.jsonl
  eval_summary_file: model-training/outputs/eval/grayin-gemma-4-e2b-wi8-afp32-smoke-summary.json
  model_id: grayin-gemma-4-E2B-it-wi8-afp32-smoke
  quantization: dynamic_wi8_afp32
  runtime_catalog_target: app/src/main/java/ai/grayin/core/ai/ModelCatalog.kt
